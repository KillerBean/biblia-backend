name: CI/CD

on:
  push:
    branches: [main, prod]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    concurrency:
      group: cicd-test-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npm test

  deploy:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/prod'
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push da imagem Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/killerbean/biblia-backend:latest
            ghcr.io/killerbean/biblia-backend:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/killerbean/biblia-backend:buildcache
          cache-to: type=registry,ref=ghcr.io/killerbean/biblia-backend:buildcache,mode=max

      - name: Port knock para abrir SSH
        run: |
          for port in ${{ secrets.KNOCK_1 }} ${{ secrets.KNOCK_2 }} ${{ secrets.KNOCK_3 }}; do
            nc -z -w1 ${{ secrets.VPS_HOST }} $port || true
            sleep 0.3
          done
          sleep 2

      - name: Deploy no VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: bash /opt/projects/production/biblia-backend/deploy.sh
