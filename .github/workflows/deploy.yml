name: CI/CD

on:
  push:
    branches: [master, prod]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    concurrency:
      group: cicd-test-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npm test

  deploy:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/prod'
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push da imagem Docker
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/killerbean/biblia-backend:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/killerbean/biblia-backend:buildcache
          cache-to: type=registry,ref=ghcr.io/killerbean/biblia-backend:buildcache,mode=max

      - name: Port knock para abrir SSH
        run: |
          for port in ${{ secrets.KNOCK_1 }} ${{ secrets.KNOCK_2 }} ${{ secrets.KNOCK_3 }}; do
            nc -z -w1 ${{ secrets.VPS_HOST }} $port || true
            sleep 0.3
          done
          sleep 2

      - name: Deploy no VPS via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        env:
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE_TAG
          script: bash /opt/projects/production/deploy.sh biblia-app
