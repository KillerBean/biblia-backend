name: GHCR Cleanup

on:
  workflow_dispatch:

jobs:
  cleanup:
    name: Delete old container versions
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Limpar versões antigas do GHCR (manter 3)
        uses: actions/delete-package-versions@v5
        with:
          package-name: biblia-backend
          package-type: container
          min-versions-to-keep: 5
          ignore-versions: "^(buildcache|latest)$"
