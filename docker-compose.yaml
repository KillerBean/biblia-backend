networks:
  nginx_net:
    driver: bridge
  vps-network:
    external: true

services:
  app:
    image: ghcr.io/killerbean/biblia-backend:latest
    hostname: app
    networks:
      - nginx_net
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3333/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.3"
        reservations:
          memory: 64m

  nginx:
    container_name: biblia-nginx
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - nginx_net
      - vps-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 32m
          cpus: "0.1"

  redis:
    image: redis:alpine
    container_name: biblia-backend-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 64mb --maxmemory-policy allkeys-lru
    networks:
      - nginx_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 80m
          cpus: "0.1"

