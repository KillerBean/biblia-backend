networks:
  nginx_net:
    driver: bridge

services:
  app-01: &app
    build: .
    hostname: app-01
    networks:
      - nginx_net
    depends_on:
      redis:
        condition: service_started
    env_file:
      - ./.env
    environment:
      - REDIS_HOST=redis
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3333/"]
      interval: 30s
      timeout: 10s
      retries: 3
  
  app-02:
    <<: *app
    hostname: app-02

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app-01:
        condition: service_healthy
      app-02:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - nginx_net
  
  redis:
    image: redis:alpine
    container_name: biblia-backend-redis
    restart: always
    networks:
      - nginx_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Postgres service kept for future migration
  db:
    container_name: biblia-backend-db
    image: postgres:18.1-alpine
    restart: unless-stopped
    environment:
        POSTGRES_DB: ${POSTGRES_DB}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        POSTGRES_USER: ${POSTGRES_USER}
    volumes:
       - ./docker/postgres/postgres.conf:/etc/postgresql.conf
       - ./docker/postgres/db.sql:/docker-entrypoint-initdb.d/db.sql
       - postgres_data:/var/lib/postgresql/data
    command: 'postgres -c config_file="/etc/postgresql.conf" -c "max_connections=450"'
    networks:
      - nginx_net
    env_file:
      - ./.env

volumes:
  postgres_data:
